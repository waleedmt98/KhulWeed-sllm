<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhulWeed's LLM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #ffffff; }
        .academic-paper { font-family: 'Libre Baskerville', serif; background-color: #fbfaf6; color: #1a1a1a; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .citation-badge { background: #fef08a; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; cursor: pointer; border: 1px solid #eab308; }
        .highlight-yellow { background-color: #fef08a; }
    </style>
</head>
<body class="h-screen w-full flex flex-col overflow-hidden text-stone-800">

    <header class="h-16 border-b border-stone-200 bg-white flex items-center justify-between px-8 shrink-0">
        <div class="flex items-center gap-2">
            <h1 class="text-xl font-bold tracking-tighter text-red-600">KhulWeed's LLM</h1>
            <span class="text-[9px] uppercase tracking-widest bg-stone-100 px-2 py-0.5 rounded text-stone-600 font-bold">Workspace</span>
        </div>
        <div class="flex items-center gap-4">
            <input type="password" id="api-key-input" class="text-xs w-64 p-2 border border-stone-200 rounded bg-white outline-none focus:border-red-500" placeholder="Enter Gemini API Key..." oninput="checkApiKey()">
            <div id="status-dot" class="w-3 h-3 rounded-full bg-stone-300 transition-colors" title="Connection Status"></div>
        </div>
    </header>

    <main class="flex flex-1 overflow-hidden">
        <section class="w-72 bg-stone-50 border-r border-stone-200 flex flex-col h-full">
            <div class="p-6 border-b border-stone-200">
                <h2 class="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-4">Library</h2>
                <button onclick="document.getElementById('file-input').click()" class="w-full bg-stone-800 hover:bg-black text-white font-medium py-2 px-4 rounded text-sm transition-all shadow-sm">Upload PDF</button>
                <input type="file" id="file-input" accept=".pdf" class="hidden" onchange="handleFileUpload(event)">
                <button onclick="renderMindMap()" class="w-full mt-2 border border-stone-300 hover:bg-white text-stone-700 font-medium py-2 px-4 rounded text-sm transition-all">View Mind Map</button>
            </div>
            <div class="flex-1 overflow-y-auto p-4" id="document-list-container">
                <ul id="document-list-render" class="space-y-1"></ul>
            </div>
        </section>

        <section class="flex-1 overflow-y-auto p-8 flex justify-center relative bg-stone-100">
            <div id="viewer-empty-state" class="flex flex-col items-center justify-center text-stone-400 space-y-4">
                <div class="w-16 h-20 border-2 border-stone-300 rounded"></div>
                <p class="font-serif italic text-sm">Upload a document to begin analysis.</p>
            </div>
            
            <div id="viewer-target" class="hidden w-full max-w-3xl academic-paper p-12 min-h-screen">
                <div id="doc-title-display" class="text-2xl font-bold border-b border-stone-800 pb-4 mb-8"></div>
                <div id="doc-viewer-content" class="prose prose-stone prose-sm max-w-none text-stone-800 leading-relaxed"></div>
            </div>
            
            <div id="mind-map-container" class="hidden absolute inset-0 bg-white z-50 p-8">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-bold">Document Concept Map</h2>
                    <button onclick="hideMindMap()" class="text-sm text-stone-500 hover:text-black underline">Close</button>
                </div>
                <div id="d3-svg" class="w-full h-full border border-stone-200 rounded"></div>
            </div>
        </section>

        <section class="w-96 bg-white border-l border-stone-200 flex flex-col h-full">
            <div class="p-4 border-b border-stone-200 flex items-center justify-between">
                <h2 class="text-[10px] font-bold text-stone-900 uppercase tracking-widest">Paper Assistant</h2>
                <button onclick="clearChat()" class="text-[10px] text-stone-500 hover:text-red-600 uppercase font-bold">Clear Chat</button>
            </div>
            <div id="chat-box" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <div class="p-4 bg-white border-t border-stone-200">
                <textarea id="user-chat-input" class="w-full p-3 text-sm border border-stone-200 rounded outline-none focus:ring-1 focus:ring-red-500 resize-none h-24" placeholder="Ask questions..." onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); executeChatMessage(); }"></textarea>
            </div>
        </section>
    </main>

    <script>
        let documentStore = [];
        let currentViewedDoc = null;

        function checkApiKey() {
            const key = document.getElementById('api-key-input').value;
            const dot = document.getElementById('status-dot');
            dot.className = key.length > 5 ? 'w-3 h-3 rounded-full bg-emerald-500' : 'w-3 h-3 rounded-full bg-stone-300';
        }

        async function handleFileUpload(event) {
            const files = event.target.files;
            for(let file of files) {
                try {
                    const pages = await parsePdfTextContents(file);
                    documentStore.push({ id: 'doc_' + Date.now(), name: file.name, pages: pages });
                } catch(e) {
                    appendChatBubble("Error parsing PDF: " + e.message, 'ai');
                }
            }
            renderDocumentLibraryUI();
        }

        async function parsePdfTextContents(file) {
            const arrayBuffer = await file.arrayBuffer();
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let pages = [];
            console.log("Parsing PDF:", file.name, "Total pages:", pdf.numPages);
            
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();
                // Extract all string items
                const text = textContent.items.map(t => t.str).join(" ");
                console.log(`Page ${i} content sample:`, text.substring(0, 50) + "...");
                pages.push({ number: i, text: text });
            }
            return pages;
        }

        function renderDocumentLibraryUI() {
            const list = document.getElementById('document-list-render');
            list.innerHTML = documentStore.map(d => `
                <li class="p-2 border border-stone-200 rounded cursor-pointer text-xs hover:border-red-400 hover:bg-stone-100 truncate transition-colors" 
                    onclick="viewDoc('${d.id}')">
                    ${d.name}
                </li>`).join("");
        }

        function viewDoc(id, highlightPage = null) {
            currentViewedDoc = documentStore.find(d => d.id === id);
            if (!currentViewedDoc) return;
            
            document.getElementById('viewer-empty-state').classList.add('hidden');
            const target = document.getElementById('viewer-target');
            target.classList.remove('hidden');
            document.getElementById('doc-title-display').innerText = currentViewedDoc.name;
            
            const contentDiv = document.getElementById('doc-viewer-content');
            contentDiv.innerHTML = currentViewedDoc.pages.map(p => 
                `<div id="page-${p.number}" class="mb-12 page-container">
                    <span class="block text-[9px] text-stone-400 uppercase tracking-widest mb-2 font-sans border-b border-stone-200 pb-1">Page ${p.number}</span>
                    <div class="text-sm font-serif leading-loose">${p.text}</div>
                </div>`
            ).join("");

            if(highlightPage) {
                const pageEl = document.getElementById(`page-${highlightPage}`);
                if(pageEl) {
                    pageEl.scrollIntoView({ behavior: 'smooth' });
                    pageEl.classList.add('highlight-yellow');
                    setTimeout(() => pageEl.classList.remove('highlight-yellow'), 3000);
                }
            }
        }

        function appendChatBubble(text, sender) {
            const box = document.getElementById('chat-box');
            const formatted = text.replace(/\[Page (\d+)\]/g, (match, p1) => 
                `<button onclick="viewDoc('${currentViewedDoc?.id || ''}', ${p1})" class="citation-badge">Page ${p1}</button>`
            );
            box.innerHTML += `<div class="p-3 rounded text-sm ${sender === 'user' ? 'bg-stone-800 text-white ml-auto' : 'bg-stone-50 border border-stone-100 text-stone-800'} max-w-[90%] shadow-sm">${formatted}</div>`;
            box.scrollTop = box.scrollHeight;
        }

        async function executeChatMessage() {
            const input = document.getElementById('user-chat-input');
            const prompt = input.value.trim();
            const apiKey = document.getElementById('api-key-input').value;
            
            if(!prompt) return;
            if(!apiKey) { appendChatBubble("Error: API Key missing.", 'ai'); return; }

            appendChatBubble(prompt, 'user');
            input.value = "";
            const processingId = "proc_" + Date.now();
            appendChatBubble('<span id="'+processingId+'">Processing with Gemini 2.5 Flash...</span>', 'ai');
            
            const contextText = documentStore.map(doc => `--- Doc: ${doc.name} ---\n` + doc.pages.map(p => `[Page ${p.number}]: ${p.text}`).join('\n')).join('\n\n');

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ role: "user", parts: [{ text: `Context:\n${contextText}\n\nQuestion: ${prompt}` }] }],
                        systemInstruction: { parts: [{ text: "You are an expert research assistant. If answering from documents, always include [Page X] citations. If general question, answer from world knowledge." }] }
                    })
                });
                
                const data = await response.json();
                document.getElementById(processingId).parentElement.remove();
                
                if(data.candidates) {
                    appendChatBubble(data.candidates[0].content.parts[0].text, 'ai');
                } else {
                    appendChatBubble("Error: " + (data.error?.message || "Unknown API Error"), 'ai');
                }
            } catch (err) {
                document.getElementById(processingId).parentElement.innerText = "Error: " + err.message;
            }
        }

        function renderMindMap() {
            const container = document.getElementById('mind-map-container');
            container.classList.remove('hidden');
            d3.select("#d3-svg").selectAll("*").remove();
            const root = d3.hierarchy({ name: "Documents", children: documentStore.map(d => ({ name: d.name })) });
            d3.tree().size([400, 400])(root);
            const svg = d3.select("#d3-svg").append("g").attr("transform", "translate(100,50)");
            svg.selectAll("line").data(root.links()).join("line").attr("x1", d => d.source.y).attr("y1", d => d.source.x).attr("x2", d => d.target.y).attr("y2", d => d.target.x).attr("stroke", "#ddd");
            svg.selectAll("circle").data(root.descendants()).join("circle").attr("cx", d => d.y).attr("cy", d => d.x).attr("r", 6).attr("fill", "#dc2626");
        }
        
        function hideMindMap() { document.getElementById('mind-map-container').classList.add('hidden'); }
        function clearChat() { document.getElementById('chat-box').innerHTML = ""; }
    </script>
</body>
</html>
